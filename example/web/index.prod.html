<!DOCTYPE html>
<html lang="de">
<head>

<body>

        defer
        data-sw-bootstrap
        src="bootstrap.js"
        data-config='{
          "logo": "icons/Icon-192.png",
          "title": "Flutter Easy SEO Demo | Live Hotel Booking Platform",
          "theme": "auto",
          "color": "#09f"
