name: flutter_easy_seo_example
description: An example of the flutter_easy_seo package.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_easy_seo:
    path: ../
  go_router: ^14.0.0
  flutter_riverpod: ^3.3.2
  flutter_web_plugins:
    sdk: flutter
  beamer: ^1.7.0
  auto_route: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

# auto_route_generator and build_runner are required when modifying route definitions:
#   dart run build_runner build
# Add to dev_dependencies:
#   auto_route_generator: ^9.0.0
#   build_runner: ^2.4.0

flutter:
  uses-material-design: true
