name: flutter_easy_seo_example
description: An example of the flutter_easy_seo package.
version: 1.0.4
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_easy_seo:
    path: ../
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  flutter_web_plugins:
    sdk: flutter
  beamer: ^1.7.0
  auto_route: ^11.1.0
  sw: ^0.1.5
  path: ^1.9.1
  http: ^1.6.0
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  auto_route_generator: ^10.5.0
  meta: ^1.18.0

flutter:
  uses-material-design: true
